<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Lattice grid pattern -->
  <rect width="128" height="128" rx="24" fill="#1a1a2e"/>
  <!-- Grid lines -->
  <line x1="32" y1="28" x2="32" y2="100" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="28" x2="64" y2="100" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="96" y1="28" x2="96" y2="100" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="40" x2="108" y2="40" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="64" x2="108" y2="64" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="88" x2="108" y2="88" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Intersection dots -->
  <circle cx="32" cy="40" r="5" fill="#4a9eff"/>
  <circle cx="64" cy="40" r="5" fill="#4a9eff"/>
  <circle cx="96" cy="40" r="5" fill="#22c55e"/>
  <circle cx="32" cy="64" r="5" fill="#4a9eff"/>
  <circle cx="64" cy="64" r="5" fill="#f59e0b"/>
  <circle cx="96" cy="64" r="5" fill="#4a9eff"/>
  <circle cx="32" cy="88" r="5" fill="#22c55e"/>
  <circle cx="64" cy="88" r="5" fill="#22c55e"/>
  <circle cx="96" cy="88" r="5" fill="#4a9eff"/>
</svg>
